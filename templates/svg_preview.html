<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>SVG Preview</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f0f2f5;
            /* 经典设计师透明度网格背景 */
            background-image: linear-gradient(45deg, #e0e0e0 25%, transparent 25%),
                              linear-gradient(-45deg, #e0e0e0 25%, transparent 25%),
                              linear-gradient(45deg, transparent 75%, #e0e0e0 75%),
                              linear-gradient(-45deg, transparent 75%, #e0e0e0 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
            font-family: system-ui, sans-serif;
        }
        .svg-container {
            max-width: 90vw;
            max-height: 90vh;
            background-color: rgba(255, 255, 255, 0.85);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border-radius: 8px;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
        }
        svg {
            max-width: 100%;
            max-height: 100%;
            height: auto;
        }
    </style>
</head>
<body>
    <div class="svg-container" id="container">
        正在渲染 SVG 矢量图...
    </div>
    <script>
        window.rawSvg = "";
        try {
            const svgB64 = "{{svg_b64}}";
            const svgContent = decodeURIComponent(escape(atob(svgB64)));
            document.getElementById('container').innerHTML = svgContent;
            window.rawSvg = svgContent;
        } catch(e) {
            document.getElementById('container').innerHTML = "<h3 style='color: #d13438;'>SVG 渲染异常: " + e.message + "</h3>";
        }

        {{getSvgAsImageData}}
    </script>
</body>
</html>
