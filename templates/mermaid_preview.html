<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Mermaid Preview</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #f8f9fa;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        #container {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
        }
        svg {
            width: 100%;
            height: 100%;
        }
        #diagram {
            font-family: inherit;
            background: transparent;
            border: none;
            margin: 0;
            padding: 0;
        }
        /* 自定义控制按钮样式，让其更美观 */
        .svg-pan-zoom-control {
            cursor: pointer;
            fill: #6c757d;
            fill-opacity: 0.8;
        }
        .svg-pan-zoom-control:hover {
            fill: #343a40;
            fill-opacity: 1;
        }
    </style>
    <!-- 引入 Mermaid JS 渲染引擎 -->
    <script src="https://unpkg.com/mermaid@10/dist/mermaid.min.js"></script>
    <!-- 引入 SVG Pan Zoom 拖拽缩放引擎 -->
    <script src="https://cdn.jsdelivr.net/npm/svg-pan-zoom@3.6.1/dist/svg-pan-zoom.min.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            mermaid.initialize({
                startOnLoad: false,
                theme: 'default',
                securityLevel: 'loose',
                flowchart: { useMaxWidth: false, htmlLabels: false }
            });
        });
    </script>
</head>
<body>
    <div id="container">
        <pre class="mermaid" id="diagram">正在加载 Mermaid 渲染图表...</pre>
    </div>
    <script>
        window.rawSvg = ""; // 供 Python 端读取的原始 SVG 代码（防缩放矩阵污染）
        
        async function renderChart() {
            try {
                const mermaidB64 = "{{mermaid_b64}}";
                const code = decodeURIComponent(escape(atob(mermaidB64)));
                
                const element = document.getElementById('diagram');
                element.textContent = code;
                
                if (typeof mermaid !== 'undefined') {
                    // 使用官方推荐的 DOM 运行渲染以确保完整的 CSS 样式注入
                    await mermaid.run({
                        nodes: [element]
                    });
                    
                    const svgElement = document.querySelector('#container svg');
                    if (svgElement) {
                        // 注入全局样式以确保 SVG 自包含 (解决导出后变黑/缺少样式的问题)
                        let styleEl = svgElement.querySelector('style');
                        if (!styleEl) {
                            styleEl = document.createElementNS('http://www.w3.org/2000/svg', 'style');
                            svgElement.insertBefore(styleEl, svgElement.firstChild);
                        }
                        let styles = '';
                        document.querySelectorAll('style').forEach(tag => {
                            styles += tag.innerHTML + '\n';
                        });
                        styleEl.innerHTML = styles + '\n' + styleEl.innerHTML;

                        // 1. 暂存纯净无缩放污染且样式自包含的原始 SVG
                        window.rawSvg = svgElement.outerHTML;
                        
                        // 2. 调整样式，让其自适应父容器
                        svgElement.style.width = '100%';
                        svgElement.style.height = '100%';
                        svgElement.style.maxWidth = '100%';
                        svgElement.style.maxHeight = '100%';
                        
                        // 3. 挂载拖拽缩放
                        window.panZoomInstance = svgPanZoom(svgElement, {
                            zoomEnabled: true,
                            controlIconsEnabled: true,
                            fit: true,
                            center: true,
                            minZoom: 0.1,
                            maxZoom: 20,
                            zoomScaleSensitivity: 0.2
                        });
                    }
                } else {
                    document.getElementById('container').innerHTML = "<h3 style='color: #d13438;'>Mermaid 库未加载成功，请检查网络连接</h3>";
                }
            } catch(e) {
                document.getElementById('container').innerHTML = "<h3 style='color: #d13438;'>Mermaid 渲染异常: " + e.message + "</h3>";
            }
        }

        {{getSvgAsImageData}}
        
        // 延迟执行渲染，确保 mermaid.initialize 已就绪
        setTimeout(renderChart, 50);
    </script>
</body>
</html>
